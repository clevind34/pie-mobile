[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/pie-data-*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"
    Content-Type = "application/json"
